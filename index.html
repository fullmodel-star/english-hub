         · 全新文件 → readyState 正常走 loading→interactive→complete，解析順序正確
         · srcdoc 繼承父層 origin → **localStorage 完全共用，學習進度一格都不會掉**
         · srcdoc 的相對網址對父層 base 解析 → sw.js / css / icon 都找得到 */
    var f=document.createElement('iframe');
    f.setAttribute('title','app');
    f.style.cssText='position:fixed;inset:0;width:100%;height:100%;border:0;margin:0;display:block';
    document.documentElement.style.cssText='margin:0;padding:0;height:100%';
    document.body.style.cssText='margin:0;padding:0;height:100%;overflow:hidden;background:#141E2B';
    document.body.innerHTML='';
    document.body.appendChild(f);
    f.srcdoc=html;
    /* ⚠️ Service Worker 與「有新版就提示」都必須由**外層**處理，不能留在 App 裡面。
       App 現在跑在 srcdoc iframe（URL＝about:srcdoc），它的 navigator.serviceWorker
       controller 永遠是 null、getRegistration 拿不到外層註冊的那個 → 家族原本
       寫在 App 內的 controllerchange/updatefound 更新橫幅會對著空的 reg 空等，永遠不跳。
       所以把 register + 更新偵測搬到這裡（真正 https 頁、真正管 SW 的地方）。 */
    setupSW();
  }
  function setupSW(){
    if(!('serviceWorker' in navigator)) return;
    var swWrap;
    navigator.serviceWorker.register('sw.js').then(function(reg){
      function offer(w){ if(w) showUpd(w); }
      offer(reg.waiting);                                   // 已經有等待中的新版
      reg.addEventListener('updatefound',function(){
        var nw=reg.installing;
        if(nw) nw.addEventListener('statechange',function(){
          if(nw.state==='installed' && navigator.serviceWorker.controller) offer(nw);
        });
      });
    }).catch(function(){});
    var refreshing=false;
    navigator.serviceWorker.addEventListener('controllerchange',function(){
      if(refreshing) return; refreshing=true; location.reload();
    });
  }
  function showUpd(worker){
    if(document.getElementById('__upd')) return;
    var b=document.createElement('div'); b.id='__upd';
    b.style.cssText='position:fixed;left:12px;right:12px;bottom:calc(12px + env(safe-area-inset-bottom,0px));'
      +'z-index:2147483600;background:#141E2B;color:#E8EAED;border:1px solid #DE9A45;border-radius:12px;'
      +'padding:12px 14px;display:flex;gap:10px;align-items:center;justify-content:space-between;'
      +'box-shadow:0 8px 30px rgba(0,0,0,.4);font-family:system-ui,-apple-system,sans-serif;font-size:14px';
    b.innerHTML='<span>有新版本可以更新</span>';
    var go=document.createElement('button');
    go.textContent='立即更新';
    go.style.cssText='background:#DE9A45;color:#141E2B;border:0;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer;flex:none';
    go.onclick=function(){ go.disabled=true; go.textContent='更新中…';
      try{ worker.postMessage({type:'SKIP_WAITING'}); worker.postMessage('SKIP_WAITING'); }catch(e){}
      setTimeout(function(){ location.reload(); },1200);    // 保底：萬一 SW 沒回應也會更新
    };
    b.appendChild(go);
    (document.body||document.documentElement).appendChild(b);
  }
  async function tryin(pw,quiet){
    var g=$('go'); if(g){g.disabled=true;} if(!quiet)$('err').textContent='解密中…';
    try{ var html=await open_(pw); if($('rm')&&$('rm').checked)localStorage.setItem(K,pw); boot(html); }
    catch(e){ localStorage.removeItem(K); if(g)g.disabled=false;
      if(!quiet){$('err').textContent='密碼不正確';$('pw').select();} else {$('err').textContent='';} }
  }
  var saved=localStorage.getItem(K);
  if(saved){ tryin(saved,true); }
  $('go').onclick=function(){tryin($('pw').value)};
  $('pw').addEventListener('keydown',function(e){if(e.key==='Enter')tryin($('pw').value)});
  $('pw').focus();
})();
</script>
